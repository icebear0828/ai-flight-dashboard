name: Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run release automation tests
        run: node --test scripts/*.test.mjs

      - name: Validate PR release notes
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json number,title,body,labels,files,url \
            --jq '[{number: .number, title: .title, body: .body, labels: [.labels[].name], url: .url, files: [.files[].path]}]' \
            > "$RUNNER_TEMP/pr.json"

          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path' > "$RUNNER_TEMP/changed-files.txt"

          node scripts/release_notes.mjs \
            --changed-files "$RUNNER_TEMP/changed-files.txt" \
            --prs "$RUNNER_TEMP/pr.json"

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build Frontend
        run: cd frontend && npm install --silent && npm run build

      - name: Install Playwright Browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run frontend E2E
        run: cd frontend && npm run test:e2e

      - name: Run unit tests
        run: go test -race -count=1 -timeout=5m ./...

      - name: Build verification
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build Frontend
        run: cd frontend && npm install --silent && npm run build

      - name: Vet
        run: go vet ./...
