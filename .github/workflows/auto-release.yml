name: Auto Release

on:
  workflow_run:
    workflows: ['Test']
    types: [completed]

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: auto-release-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-release:
    name: Auto Release
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard release target
        id: guard
        run: |
          event_sha="${{ github.event.workflow_run.head_sha }}"
          current_sha="$(git rev-parse HEAD)"

          if [[ "$event_sha" != "$current_sha" ]]; then
            echo "Skipping stale Test run for $event_sha; current main is $current_sha."
            echo "continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Skipping release because main HEAD is already release-tagged:"
            git tag --points-at HEAD
            echo "continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "continue=true" >> "$GITHUB_OUTPUT"

      - name: Resolve release range
        id: range
        if: steps.guard.outputs.continue == 'true'
        run: |
          latest_tag="$(git tag --merged HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest_tag" ]]; then
            base_ref="$(git rev-list --max-parents=0 HEAD)"
          else
            base_ref="$latest_tag"
          fi

          git diff --name-only "$base_ref"..HEAD > "$RUNNER_TEMP/changed-files.txt"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
          echo "changed_files=$RUNNER_TEMP/changed-files.txt" >> "$GITHUB_OUTPUT"

      - name: Collect pull request metadata
        if: steps.guard.outputs.continue == 'true'
        env:
          BASE_REF: ${{ steps.range.outputs.base_ref }}
          GH_TOKEN: ${{ github.token }}
          PRS_FILE: ${{ runner.temp }}/release-prs.json
        run: |
          node <<'NODE'
          import fs from 'node:fs';
          import { execFileSync } from 'node:child_process';

          const repo = process.env.GITHUB_REPOSITORY;
          const baseRef = process.env.BASE_REF;
          const prsFile = process.env.PRS_FILE;
          const shas = execFileSync('git', ['rev-list', '--reverse', `${baseRef}..HEAD`], {
            encoding: 'utf8',
          })
            .split(/\s+/)
            .filter(Boolean);
          const prs = new Map();

          for (const sha of shas) {
            const raw = execFileSync(
              'gh',
              ['api', '-H', 'Accept: application/vnd.github+json', `/repos/${repo}/commits/${sha}/pulls`],
              { encoding: 'utf8' },
            );
            for (const pr of JSON.parse(raw)) {
              if (prs.has(pr.number)) {
                continue;
              }

              let files = [];
              try {
                files = execFileSync(
                  'gh',
                  ['pr', 'view', String(pr.number), '--repo', repo, '--json', 'files', '--jq', '.files[].path'],
                  { encoding: 'utf8' },
                )
                  .split(/\r?\n/)
                  .filter(Boolean);
              } catch {
                files = [];
              }

              prs.set(pr.number, {
                number: pr.number,
                title: pr.title,
                body: pr.body ?? '',
                labels: (pr.labels ?? []).map((label) => label.name),
                url: pr.html_url,
                files,
              });
            }
          }

          fs.writeFileSync(prsFile, `${JSON.stringify([...prs.values()], null, 2)}\n`);
          NODE

          echo "Collected pull requests:"
          cat "$PRS_FILE"

      - name: Plan release
        id: plan
        if: steps.guard.outputs.continue == 'true'
        run: |
          node scripts/release_notes.mjs \
            --changed-files "${{ steps.range.outputs.changed_files }}" \
            --prs "$RUNNER_TEMP/release-prs.json" \
            --plan-out "$RUNNER_TEMP/release-plan.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve next version
        id: version
        if: steps.plan.outputs.should_release == 'true'
        run: |
          latest_tag="${{ steps.range.outputs.latest_tag }}"
          bump="${{ steps.plan.outputs.bump }}"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            IFS=. read -r major minor patch <<< "${latest_tag#v}"
            case "$bump" in
              major)
                next_tag="v$((major + 1)).0.0"
                ;;
              minor)
                next_tag="v${major}.$((minor + 1)).0"
                ;;
              patch)
                next_tag="v${major}.${minor}.$((patch + 1))"
                ;;
              *)
                echo "Unsupported release bump: $bump"
                exit 1
                ;;
            esac
          fi

          if git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null; then
            echo "Tag $next_tag already exists"
            exit 1
          fi

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $next_tag"

      - name: Generate release notes
        if: steps.plan.outputs.should_release == 'true'
        run: |
          node scripts/release_notes.mjs \
            --changed-files "${{ steps.range.outputs.changed_files }}" \
            --prs "$RUNNER_TEMP/release-prs.json" \
            --version "${{ steps.version.outputs.tag }}" \
            --notes-out "$RUNNER_TEMP/release-notes.md"

          cat "$RUNNER_TEMP/release-notes.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Create tag and dispatch release
        if: steps.plan.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

          release_notes_b64="$(base64 -w0 "$RUNNER_TEMP/release-notes.md")"
          gh workflow run release.yml --ref "$tag" -f release_notes_b64="$release_notes_b64"

      - name: Report skipped release
        if: steps.guard.outputs.continue == 'true' && steps.plan.outputs.should_release == 'false'
        run: |
          echo "Release skipped: ${{ steps.plan.outputs.skip_reason }}"
