name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build macOS M-Series (Apple Silicon)
        run: |
          wails build -platform darwin/arm64 -clean
          cd build/bin
          tar -czvf ai-flight-dashboard-macos-m-series.tar.gz "AI Flight Dashboard.app"
          rm -rf "AI Flight Dashboard.app"
      - name: Build macOS Intel
        run: |
          wails build -platform darwin/amd64 -clean
          cd build/bin
          tar -czvf ai-flight-dashboard-macos-intel.tar.gz "AI Flight Dashboard.app"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Windows App
        run: wails build -platform windows/amd64 -clean
      - name: Archive App
        run: |
          cd build/bin
          Compress-Archive -Path "AI Flight Dashboard.exe" -DestinationPath ai-flight-dashboard-windows.zip
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/ai-flight-dashboard-windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev || sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Linux App
        run: wails build -platform linux/amd64 -clean
      - name: Archive App
        run: |
          cd build/bin
          tar -czvf ai-flight-dashboard-linux.tar.gz ai-flight-dashboard
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/ai-flight-dashboard-linux.tar.gz
